---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-service
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: default
  labels:
    app: config-service
    demo: dynamic-config
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
      annotations:
        "consul.hashicorp.com/connect-inject": "false"
        
        # Vault Agent Injector annotations
        "vault.hashicorp.com/agent-inject": "true"
        "vault.hashicorp.com/role": "config-service-role"
        
        # Inyectar API keys
        "vault.hashicorp.com/agent-inject-secret-apikeys.env": "secret/data/demo04/api-keys"
        "vault.hashicorp.com/agent-inject-template-apikeys.env": |
          {{- with secret "secret/data/demo04/api-keys" -}}
          export WEATHER_API_KEY="{{ index .Data.data "weather-api" }}"
          export PAYMENT_GATEWAY_KEY="{{ index .Data.data "payment-gateway" }}"
          export MAPS_API_KEY="{{ index .Data.data "maps-api" }}"
          export ANALYTICS_ID="{{ .Data.data.analytics }}"
          {{- end -}}
        
        # Inyectar JWT secrets
        "vault.hashicorp.com/agent-inject-secret-jwt.env": "secret/data/demo04/jwt"
        "vault.hashicorp.com/agent-inject-template-jwt.env": |
          {{- with secret "secret/data/demo04/jwt" -}}
          export JWT_SECRET="{{ .Data.data.secret }}"
          export JWT_ALGORITHM="{{ .Data.data.algorithm }}"
          export JWT_EXPIRATION="{{ .Data.data.expiration }}"
          export JWT_ISSUER="{{ .Data.data.issuer }}"
          {{- end -}}
    spec:
      serviceAccountName: config-service
      containers:
      - name: config-service
        image: config-service:latest
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
          - /app/config-service.sh
        ports:
        - containerPort: 8085
          name: http
          protocol: TCP
        startupProbe:
          tcpSocket:
            port: 8085
          timeoutSeconds: 10
          periodSeconds: 5
          initialDelaySeconds: 10
          failureThreshold: 30
        livenessProbe:
          tcpSocket:
            port: 8085
          timeoutSeconds: 5
          initialDelaySeconds: 0
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8085
          timeoutSeconds: 5
          initialDelaySeconds: 0
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 100
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: default
  labels:
    app: config-service
  annotations:
    "consul.hashicorp.com/service-name": "config-service"
    "consul.hashicorp.com/service-port": "8085"
spec:
  type: ClusterIP
  selector:
    app: config-service
  ports:
  - name: http
    port: 8085
    targetPort: 8085
    protocol: TCP
