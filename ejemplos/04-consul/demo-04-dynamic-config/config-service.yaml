---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-service
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: default
  labels:
    app: config-service
    demo: dynamic-config
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
      annotations:
        "consul.hashicorp.com/connect-inject": "false"
        
        # Vault Agent Injector annotations
        "vault.hashicorp.com/agent-inject": "true"
        "vault.hashicorp.com/role": "config-service-role"
        
        # Inyectar API keys
        "vault.hashicorp.com/agent-inject-secret-apikeys.env": "secret/data/demo04/api-keys"
        "vault.hashicorp.com/agent-inject-template-apikeys.env": |
          {{- with secret "secret/data/demo04/api-keys" -}}
          export WEATHER_API_KEY="{{ index .Data.data "weather-api" }}"
          export PAYMENT_GATEWAY_KEY="{{ index .Data.data "payment-gateway" }}"
          export MAPS_API_KEY="{{ index .Data.data "maps-api" }}"
          export ANALYTICS_ID="{{ .Data.data.analytics }}"
          {{- end -}}
        
        # Inyectar JWT secrets
        "vault.hashicorp.com/agent-inject-secret-jwt.env": "secret/data/demo04/jwt"
        "vault.hashicorp.com/agent-inject-template-jwt.env": |
          {{- with secret "secret/data/demo04/jwt" -}}
          export JWT_SECRET="{{ .Data.data.secret }}"
          export JWT_ALGORITHM="{{ .Data.data.algorithm }}"
          export JWT_EXPIRATION="{{ .Data.data.expiration }}"
          export JWT_ISSUER="{{ .Data.data.issuer }}"
          {{- end -}}
    spec:
      serviceAccountName: config-service
      containers:
      - name: config-service
        image: config-service:latest
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
          - -c
          - |
            echo "=== Config Service with Dynamic Configuration ==="
            
            # Esperar a que Vault inyecte los secretos
            while [ ! -f /vault/secrets/apikeys.env ]; do
              echo "Waiting for Vault to inject secrets..."
              sleep 2
            done
            
            echo "✅ Vault secrets injected"
            
            # Source secrets
            source /vault/secrets/apikeys.env
            source /vault/secrets/jwt.env
            
            echo "Starting Config Service on port 8085..."
            echo "Consul KV prefix: demo04/config/"
            
            # URL de Consul
            CONSUL_URL="http://consul-server.consul.svc.cluster.local:8500"
            
            # Función para obtener valor de Consul KV
            consul_get() {
              curl -s "$CONSUL_URL/v1/kv/demo04/config/$1?raw" 2>/dev/null || echo "not-set"
            }
            
            # Servidor HTTP simple
            while true; do
              echo -ne "HTTP/1.1 200 OK\r\nContent-Type: application/json\r\nConnection: close\r\n\r\n{\"config\":{\"features\":{\"new-ui\":\"$(consul_get features/new-ui)\",\"analytics\":\"$(consul_get features/analytics)\",\"dark-mode\":\"$(consul_get features/dark-mode)\",\"beta-features\":\"$(consul_get features/beta-features)\"},\"ratelimit\":{\"requests-per-second\":\"$(consul_get ratelimit/requests-per-second)\",\"burst\":\"$(consul_get ratelimit/burst)\",\"enabled\":\"$(consul_get ratelimit/enabled)\"},\"cache\":{\"ttl\":\"$(consul_get cache/ttl)\",\"max-size\":\"$(consul_get cache/max-size)\",\"enabled\":\"$(consul_get cache/enabled)\"}},\"secrets\":{\"apiKeys\":{\"weatherApi\":\"${WEATHER_API_KEY:0:10}***\",\"paymentGateway\":\"${PAYMENT_GATEWAY_KEY:0:10}***\",\"mapsApi\":\"${MAPS_API_KEY:0:10}***\",\"analytics\":\"${ANALYTICS_ID}\"},\"jwt\":{\"algorithm\":\"$JWT_ALGORITHM\",\"expiration\":\"$JWT_EXPIRATION\",\"issuer\":\"$JWT_ISSUER\"}},\"metadata\":{\"lastUpdate\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"instance\":\"$(hostname)\",\"sources\":{\"config\":\"consul-kv\",\"secrets\":\"vault-agent-injector\"}}}\r\n" | nc -l -p 8085
            done
        ports:
        - containerPort: 8085
          name: http
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: 8085
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8085
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 100
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: default
  labels:
    app: config-service
  annotations:
    "consul.hashicorp.com/service-name": "config-service"
    "consul.hashicorp.com/service-port": "8085"
spec:
  type: ClusterIP
  selector:
    app: config-service
  ports:
  - name: http
    port: 8085
    targetPort: 8085
    protocol: TCP
