---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-service
  namespace: default
  labels:
    app: backend-service
    demo: consul-health-checks
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-service
  template:
    metadata:
      labels:
        app: backend-service
      annotations:
        "consul.hashicorp.com/connect-inject": "false"
    spec:
      containers:
      - name: backend
        image: backend-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        # Kubernetes liveness check: verifica que el pod sigue vivo
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "[ ! -f /tmp/unhealthy ]"
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        # Kubernetes readiness check: verifica que el pod está listo para tráfico
        # Consul también usa esto para determinar si incluir la instancia
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "[ ! -f /tmp/unhealthy ]"
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
      # Nota: busybox corre como root por defecto
      # En producción, usa una imagen con usuario non-root
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: default
  labels:
    app: backend-service
  annotations:
    # Consul registra este servicio automáticamente
    "consul.hashicorp.com/service-name": "backend-service"
    "consul.hashicorp.com/service-port": "8080"
    # Consul heredará los health checks de Kubernetes
    "consul.hashicorp.com/service-sync": "true"
spec:
  type: ClusterIP
  selector:
    app: backend-service
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
