---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-service
  namespace: default
  labels:
    app: client-service
    demo: consul-health-checks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-service
  template:
    metadata:
      labels:
        app: client-service
      annotations:
        "consul.hashicorp.com/connect-inject": "false"
    spec:
      containers:
      - name: client
        image: client-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
          name: http
          protocol: TCP
        env:
        - name: BACKEND_URL
          value: "http://backend-service.service.consul:8080"
        livenessProbe:
          httpGet:
            path: /
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8082
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 100
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: default
  labels:
    app: client-service
  annotations:
    "consul.hashicorp.com/service-name": "client-service"
    "consul.hashicorp.com/service-port": "8082"
spec:
  type: ClusterIP
  selector:
    app: client-service
  ports:
  - name: http
    port: 8082
    targetPort: 8082
    protocol: TCP
