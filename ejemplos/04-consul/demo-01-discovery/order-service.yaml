---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: default
data:
  application.properties: |
    quarkus.http.port=8081
    quarkus.application.name=order-service
    # URL del product-service via Consul DNS
    product.service.url=http://product-service.service.consul:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: default
  labels:
    app: order-service
    demo: consul-discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        "consul.hashicorp.com/connect-inject": "false"
    spec:
      containers:
      - name: order-service
        image: localhost/order-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        env:
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service.service.consul:8080"
        livenessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 100
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: default
  labels:
    app: order-service
  annotations:
    "consul.hashicorp.com/service-name": "order-service"
    "consul.hashicorp.com/service-port": "8081"
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
  - name: http
    port: 8081
    targetPort: 8081
    protocol: TCP
