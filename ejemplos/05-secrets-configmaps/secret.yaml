# Ejemplo Guía 06 — Secret (datos sensibles)
# En producción no subir contraseñas reales; usar Vault o CI/CD que inyecte valores
# Los valores están en base64 (ejemplo: echo -n "admin" | base64 = YWRtaW4=)
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  # stringData permite texto plano; Kubernetes lo codifica en base64 al guardar
  username: "appuser"
  password: "changeme-in-production"
