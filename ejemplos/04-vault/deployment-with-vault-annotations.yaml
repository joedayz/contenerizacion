# Ejemplo Guía 04 — Deployment con anotaciones para Vault Agent Injector
# Requiere: Vault + Vault Agent Injector instalados y configurados (Kubernetes auth + KV secret)
# Los secretos se montan en /vault/secrets/ como archivos
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-con-vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-con-vault
  template:
    metadata:
      labels:
        app: app-con-vault
      annotations:
        # Vault Agent Injector: inyectar secretos en este Pod
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "mi-app"                    # Rol de Vault para este SA/namespace
        vault.hashicorp.com/agent-inject-secret-db: "secret/data/mi-app/db"
        # Formato del archivo inyectado (ejemplo: env)
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/mi-app/db" -}}
          export DB_USERNAME="{{ .Data.data.username }}"
          export DB_PASSWORD="{{ .Data.data.password }}"
          {{- end -}}
    spec:
      serviceAccountName: default
      containers:
        - name: app
          image: busybox:latest
          command: ["sh", "-c", "source /vault/secrets/db && echo Usuario: $DB_USERNAME && sleep 3600"]
