---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: default
data:
  application.properties: |
    quarkus.http.port=8081
    quarkus.application.name=order-service
    # URL del product-service via Consul DNS
    product.service.url=http://product-service.service.consul:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: default
  labels:
    app: order-service
    demo: consul-discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        "consul.hashicorp.com/connect-inject": "false"
    spec:
      containers:
      - name: order-service
        image: curlimages/curl:8.1.2
        command:
          - /bin/sh
          - -c
          - |
            # Simular un microservicio de órdenes que consume product-service
            cat > /tmp/server.sh << 'EOF'
            #!/bin/sh
            echo "Starting Order Service on port 8081..."
            echo "Product Service URL: $PRODUCT_SERVICE_URL"
            
            # Función para hacer requests a product-service
            fetch_products() {
              PRODUCTS=$(curl -s "$PRODUCT_SERVICE_URL/api/products" 2>/dev/null || echo '{"error":"Could not reach product-service"}')
              echo "$PRODUCTS"
            }
            
            while true; do
              {
                REQUEST=$(timeout 1 nc -l -p 8081)
                
                echo -e "HTTP/1.1 200 OK\r"
                echo -e "Content-Type: application/json\r"
                echo -e "Connection: close\r"
                echo -e "\r"
                
                if echo "$REQUEST" | grep -q "GET /api/orders/products"; then
                  # Proxy directo a products
                  fetch_products
                elif echo "$REQUEST" | grep -q "GET /api/orders"; then
                  # Órdenes que incluyen info de productos
                  PRODUCTS=$(fetch_products)
                  cat << ORDERS
            {
              "orders": [
                {
                  "orderId": 1,
                  "productId": 1,
                  "quantity": 2,
                  "status": "pending"
                },
                {
                  "orderId": 2,
                  "productId": 2,
                  "quantity": 1,
                  "status": "shipped"
                }
              ],
              "discoveryInfo": {
                "method": "consul-dns",
                "productServiceUrl": "$PRODUCT_SERVICE_URL",
                "resolvedFrom": "$(hostname)"
              },
              "availableProducts": $PRODUCTS
            }
            ORDERS
                elif echo "$REQUEST" | grep -q "GET /q/health"; then
                  # Health check
                  echo '{"status":"UP","checks":[]}'
                else
                  echo '{"error":"Not found","endpoints":["/api/orders","/api/orders/products","/q/health"]}'
                fi
              } | nc -l -p 8081 -q 1 2>/dev/null
            done
            EOF
            
            chmod +x /tmp/server.sh
            /tmp/server.sh
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        env:
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service.service.consul:8080"
        livenessProbe:
          httpGet:
            path: /q/health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /q/health
            port: 8081
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 100
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: default
  labels:
    app: order-service
  annotations:
    "consul.hashicorp.com/service-name": "order-service"
    "consul.hashicorp.com/service-port": "8081"
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
  - name: http
    port: 8081
    targetPort: 8081
    protocol: TCP
