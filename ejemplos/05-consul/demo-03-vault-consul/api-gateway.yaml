---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: default
  labels:
    app: api-gateway
    demo: vault-consul
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        "consul.hashicorp.com/connect-inject": "false"
    spec:
      containers:
      - name: gateway
        image: curlimages/curl:8.1.2
        command:
          - /bin/sh
          - -c
          - |
            # API Gateway que consume user-service via Consul DNS
            cat > /tmp/gateway.sh << 'EOF'
            #!/bin/sh
            echo "=== API Gateway Starting ==="
            echo "User Service URL: $USER_SERVICE_URL"
            
            # Función para llamar a user-service
            call_user_service() {
              ENDPOINT="$1"
              curl -s "$USER_SERVICE_URL$ENDPOINT" 2>/dev/null || echo '{"error":"User service not reachable"}'
            }
            
            # Función para obtener info de discovery
            get_discovery_info() {
              # Resolver IPs de user-service via Consul DNS
              USER_SERVICE_IPS=$(nslookup user-service.service.consul 2>/dev/null | grep "Address" | tail -n +2 | awk '{print $3}' | paste -sd,)
              
              # Obtener info del user-service
              USER_SERVICE_INFO=$(call_user_service "/api/info")
              
              cat << JSON
            {
              "gateway": {
                "name": "api-gateway",
                "instance": "$(hostname)"
              },
              "userService": {
                "discoveredVia": "consul-dns",
                "url": "$USER_SERVICE_URL",
                "resolvedIPs": "$USER_SERVICE_IPS",
                "serviceInfo": $USER_SERVICE_INFO
              },
              "consul": {
                "dnsQuery": "user-service.service.consul",
                "dnsResponse": "multiple IPs (load balanced)"
              }
            }
            JSON
            }
            
            while true; do
              REQUEST=$(timeout 1 nc -l -p 8090 2>/dev/null)
              METHOD=$(echo "$REQUEST" | head -1 | awk '{print $1}')
              PATH=$(echo "$REQUEST" | head -1 | awk '{print $2}')
              
              {
                if [ "$PATH" = "/api/users" ] && [ "$METHOD" = "GET" ]; then
                  # Proxy a GET /api/users
                  echo -e "HTTP/1.1 200 OK\r"
                  echo -e "Content-Type: application/json\r"
                  echo -e "Connection: close\r"
                  echo -e "\r"
                  call_user_service "/api/users"
                  
                elif [ "$PATH" = "/api/discovery/info" ] && [ "$METHOD" = "GET" ]; then
                  # Info de service discovery
                  echo -e "HTTP/1.1 200 OK\r"
                  echo -e "Content-Type: application/json\r"
                  echo -e "Connection: close\r"
                  echo -e "\r"
                  get_discovery_info
                  
                elif [ "$PATH" = "/q/health" ] && [ "$METHOD" = "GET" ]; then
                  # Health check del gateway
                  # Verificar que puede alcanzar user-service
                  HEALTH=$(call_user_service "/q/health")
                  if echo "$HEALTH" | grep -q '"status":"UP"'; then
                    echo -e "HTTP/1.1 200 OK\r"
                    echo -e "Content-Type: application/json\r"
                    echo -e "Connection: close\r"
                    echo -e "\r"
                    echo '{"status":"UP","checks":[{"name":"user-service","status":"UP"}]}'
                  else
                    echo -e "HTTP/1.1 503 Service Unavailable\r"
                    echo -e "Content-Type: application/json\r"
                    echo -e "Connection: close\r"
                    echo -e "\r"
                    echo '{"status":"DOWN","checks":[{"name":"user-service","status":"DOWN"}]}'
                  fi
                  
                elif echo "$PATH" | grep -q "^/api/users/" && [ "$METHOD" = "GET" ]; then
                  # Proxy a GET /api/users/:id
                  USER_ID=$(echo "$PATH" | sed 's|/api/users/||')
                  echo -e "HTTP/1.1 200 OK\r"
                  echo -e "Content-Type: application/json\r"
                  echo -e "Connection: close\r"
                  echo -e "\r"
                  call_user_service "/api/users/$USER_ID"
                  
                elif [ "$PATH" = "/" ] && [ "$METHOD" = "GET" ]; then
                  # Root endpoint con documentación
                  echo -e "HTTP/1.1 200 OK\r"
                  echo -e "Content-Type: application/json\r"
                  echo -e "Connection: close\r"
                  echo -e "\r"
                  cat << JSON
            {
              "service": "api-gateway",
              "version": "1.0.0",
              "demo": "vault-consul-integration",
              "endpoints": {
                "users": {
                  "GET /api/users": "List all users",
                  "GET /api/users/:id": "Get user by ID"
                },
                "discovery": {
                  "GET /api/discovery/info": "Service discovery information"
                },
                "health": {
                  "GET /q/health": "Health check"
                }
              },
              "architecture": {
                "gateway": "Discovers services via Consul DNS",
                "userService": "Gets DB credentials from Vault",
                "database": "PostgreSQL discovered via Consul"
              }
            }
            JSON
                  
                else
                  echo -e "HTTP/1.1 404 Not Found\r"
                  echo -e "Content-Type: application/json\r"
                  echo -e "Connection: close\r"
                  echo -e "\r"
                  cat << JSON
            {
              "error": "Not found",
              "path": "$PATH",
              "method": "$METHOD",
              "availableEndpoints": [
                "GET /",
                "GET /api/users",
                "GET /api/users/:id",
                "GET /api/discovery/info",
                "GET /q/health"
              ]
            }
            JSON
                fi
              } | nc -l -p 8090 -q 1 2>/dev/null
            done
            EOF
            
            chmod +x /tmp/gateway.sh
            /tmp/gateway.sh
        ports:
        - containerPort: 8090
          name: http
          protocol: TCP
        env:
        - name: USER_SERVICE_URL
          value: "http://user-service.service.consul:8080"
        livenessProbe:
          httpGet:
            path: /q/health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /q/health
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 100
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
  labels:
    app: api-gateway
  annotations:
    "consul.hashicorp.com/service-name": "api-gateway"
    "consul.hashicorp.com/service-port": "8090"
    "consul.hashicorp.com/service-tags": "gateway,public"
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 8090
    targetPort: 8090
    protocol: TCP
