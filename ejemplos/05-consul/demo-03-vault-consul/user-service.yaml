---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: default
data:
  application.properties: |
    # Quarkus configuration
    quarkus.http.port=8080
    quarkus.application.name=user-service
    
    # Datasource configuration
    # URL usa Consul DNS para descubrir PostgreSQL
    quarkus.datasource.db-kind=postgresql
    quarkus.datasource.jdbc.url=jdbc:postgresql://postgres-db.service.consul:5432/userdb
    
    # Credenciales vienen desde archivo inyectado por Vault
    # El archivo /vault/secrets/database-config.txt contiene:
    # username=xxx
    # password=yyy
    quarkus.datasource.username=${DB_USERNAME}
    quarkus.datasource.password=${DB_PASSWORD}
    
    # Hibernate
    quarkus.hibernate-orm.database.generation=update
    quarkus.hibernate-orm.log.sql=true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: default
  labels:
    app: user-service
    demo: vault-consul
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
      annotations:
        # Consul: Solo registro, sin mesh
        "consul.hashicorp.com/connect-inject": "false"
        
        # Vault Agent Injector annotations
        "vault.hashicorp.com/agent-inject": "true"
        "vault.hashicorp.com/role": "user-service-role"
        "vault.hashicorp.com/agent-inject-secret-database-config.txt": "secret/data/demo03/database"
        
        # Template para formatear el secreto
        "vault.hashicorp.com/agent-inject-template-database-config.txt": |
          {{- with secret "secret/data/demo03/database" -}}
          export DB_USERNAME="{{ .Data.data.username }}"
          export DB_PASSWORD="{{ .Data.data.password }}"
          export DB_HOST="{{ .Data.data.host }}"
          export DB_PORT="{{ .Data.data.port }}"
          export DB_DATABASE="{{ .Data.data.database }}"
          {{- end -}}
    spec:
      serviceAccountName: user-service
      containers:
      - name: user-service
        # Imagen local construida con Dockerfile.user-service
        image: localhost/user-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        # Health checks que Consul heredará
        livenessProbe:
          httpGet:
            path: /q/health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /q/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: default
  labels:
    app: user-service
  annotations:
    "consul.hashicorp.com/service-name": "user-service"
    "consul.hashicorp.com/service-port": "8080"
    "consul.hashicorp.com/service-tags": "api,users"
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
