---
apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
# PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_PASSWORD
              value: demo
            - name: POSTGRES_DB
              value: orders
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: demo
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
---
# Kafka (single broker for demo)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:latest
          env:
            - name: KAFKA_CFG_ZOOKEEPER_CONNECT
              value: localhost:2181
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
          ports:
            - containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: demo
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
---
# Order Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: sample-spring-kafka-microservices/order-service:1.0-SNAPSHOT
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: demo
spec:
  selector:
    app: order-service
  ports:
    - port: 80
      targetPort: 8080
---
# Stock Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-service
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-service
  template:
    metadata:
      labels:
        app: stock-service
    spec:
      containers:
        - name: stock-service
          image: sample-spring-kafka-microservices/stock-service:1.0-SNAPSHOT
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: stock-service
  namespace: demo
spec:
  selector:
    app: stock-service
  ports:
    - port: 80
      targetPort: 8081
---
# Ingress simple
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: demo
spec:
  rules:
    - host: demo.local
      http:
        paths:
          - path: /orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 80
          - path: /stock
            pathType: Prefix
            backend:
              service:
                name: stock-service
                port:
                  number: 80